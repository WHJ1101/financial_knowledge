<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>投研助手</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">研</div>
        <div>
          <strong>投研助手</strong>
          <span>版本 0.1.0 · 本地优先</span>
        </div>
      </div>

      <nav class="nav" aria-label="主导航">
        <a class="nav-item active" href="#today"><span class="nav-icon">今</span>今日</a>
        <a class="nav-item" href="#wiki"><span class="nav-icon">库</span>知识库</a>

        <p class="nav-label">投资</p>
        <a class="nav-item" href="#stocks"><span class="nav-icon">股</span>股票</a>
        <a class="nav-item" href="#positions"><span class="nav-icon">仓</span>持仓</a>
        <a class="nav-item" href="#etfs"><span class="nav-icon">基</span>指数基金</a>
        <a class="nav-item" href="#decisions"><span class="nav-icon">策</span>决策</a>
        <a class="nav-item" href="#calendar"><span class="nav-icon">历</span>日历</a>

        <p class="nav-label">知识</p>
        <a class="nav-item" href="#knowledge"><span class="nav-icon">知</span>知识</a>
        <a class="nav-item" href="#candidates"><span class="nav-icon">选</span>候选</a>
        <a class="nav-item" href="#suggestions"><span class="nav-icon">议</span>建议</a>

        <p class="nav-label">流程</p>
        <a class="nav-item" href="#workflow"><span class="nav-icon">流</span>工作流</a>
        <a class="nav-item" href="#import"><span class="nav-icon">导</span>导入</a>
        <a class="nav-item" href="#tasks"><span class="nav-icon">任</span>任务</a>
        <a class="nav-item" href="#logs"><span class="nav-icon">志</span>日志</a>

        <p class="nav-label">系统</p>
        <a class="nav-item" href="#settings"><span class="nav-icon">设</span>设置</a>
      </nav>

      <div class="vault-status">
        <span class="dot"></span>
        <span>资料库已连接</span>
        <button id="syncButton" type="button">同步</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <label class="search-box" for="searchInput">
          <span>⌕</span>
          <input id="searchInput" autocomplete="off" placeholder="搜索笔记、标的、任务..." type="search">
        </label>
        <label class="origin-filter" for="originFilter">
          <span>产出</span>
          <select id="originFilter">
            <option value="all">全部</option>
            <option value="automation">自动化</option>
            <option value="manual">手动</option>
          </select>
        </label>
        <div class="top-actions">
          <button class="status-pill ok" type="button" disabled><span></span>知识库正常</button>
          <button id="automationButton" class="status-pill" type="button">自动化 暂停</button>
          <a class="status-pill link" href="/api/status" target="_blank" rel="noreferrer">接口</a>
        </div>
      </header>

      <section id="view" class="view" aria-live="polite"></section>
    </main>
  </div>

  <template id="todayTemplate">
    <div class="page-head">
      <p id="currentTime" class="time-row">--</p>
      <h1>今日</h1>
    </div>

    <section class="stats-grid" aria-label="概览">
      <article class="stat-card">
        <span>今日更新</span>
        <strong id="todayCount">0</strong>
        <p>网页报告</p>
      </article>
      <article class="stat-card">
        <span>未读合计</span>
        <strong id="unreadCount">0</strong>
        <p>近 7 天新增 / 修改</p>
      </article>
    </section>

    <section class="composer">
      <div>
        <h2>发起调研</h2>
        <p>输入一个行业、股票或政策主题，系统会生成网页报告并写入本地资料库。</p>
      </div>
      <form id="researchForm" class="research-form">
        <select id="researchType" aria-label="调研类型">
          <option value="industry">产业链深度</option>
          <option value="market">市场快览</option>
          <option value="stock">个股跟踪</option>
          <option value="policy">政策扫描</option>
          <option value="custom">主题调研</option>
        </select>
        <input id="topicInput" required placeholder="例如：机器人产业链：减速器、传感器与端侧智能落地">
        <button type="submit">生成报告</button>
      </form>
    </section>

    <section class="board">
      <div class="board-head">
        <div>
          <h2>今日聚焦报告</h2>
          <p>按更新时间聚合，点击进入报告阅读页。</p>
        </div>
        <button id="runDailyButton" class="ghost-button" type="button">执行日更</button>
      </div>
      <div id="reportSections" class="report-sections"></div>
    </section>
  </template>

  <template id="reportTemplate">
    <section class="reader-page">
      <div class="reader-toolbar">
        <a href="#today" class="back-link">← 返回今日</a>
        <a id="openReportLink" class="ghost-button" target="_blank" rel="noreferrer">打开网页报告</a>
      </div>
      <div class="reader-title">
        <p id="readerMeta"></p>
        <h1 id="readerHeading"></h1>
      </div>
      <iframe id="reportFrame" title="网页报告预览"></iframe>
    </section>
  </template>

  <script src="/app.js" type="module"></script>
</body>
</html>
